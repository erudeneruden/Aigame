<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 ジャグラー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0005;--panel:#120010;--gold:#FFD700;--red:#ff2244;
  --green:#00ff88;--purple:#9933ff;--neon:#ff00ff;
  --text:#f0e0ff;--dim:#8866aa;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:20px;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(153,51,255,.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 50%,rgba(255,0,255,.06) 0%,transparent 60%);
}
h1.title{
  font-family:'Orbitron',monospace;font-size:clamp(22px,5vw,38px);
  font-weight:900;color:var(--gold);letter-spacing:4px;
  text-shadow:0 0 20px rgba(255,215,0,.6),0 0 40px rgba(255,215,0,.3);
  margin-bottom:6px;text-align:center;
}
.subtitle{font-size:12px;color:var(--dim);letter-spacing:3px;margin-bottom:20px;text-align:center}
.machine{
  background:linear-gradient(160deg,#1a0025,#0d0015);
  border:2px solid #4400aa;border-radius:24px;padding:28px 32px;
  width:min(480px,100%);
  box-shadow:0 0 40px rgba(153,51,255,.3),inset 0 1px 0 rgba(255,255,255,.05);
  position:relative;overflow:hidden;
}
.machine::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--purple),var(--neon),var(--purple),transparent);
}
/* GoGo Lamp */
.lamp-wrap{display:flex;justify-content:center;margin-bottom:20px;position:relative}
.lamp{
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle,#2a0030,#150018);
  border:3px solid #3a0050;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#440055;
  letter-spacing:1px;transition:all .3s;
  box-shadow:0 0 0 rgba(255,0,255,0);
  position:relative;
  font-family:'Orbitron',monospace;
}
.lamp.on{
  background:radial-gradient(circle,#ff66ff,#ff00cc,#cc0099);
  border-color:#ff88ff;color:#fff;
  box-shadow:0 0 30px rgba(255,0,255,.9),0 0 60px rgba(255,0,255,.5),0 0 100px rgba(255,0,255,.3);
  animation:lamp-pulse .6s ease-in-out infinite alternate;
}
@keyframes lamp-pulse{from{box-shadow:0 0 20px rgba(255,0,255,.7),0 0 40px rgba(255,0,255,.4)}to{box-shadow:0 0 40px rgba(255,0,255,1),0 0 80px rgba(255,0,255,.7),0 0 120px rgba(255,0,255,.4)}}
.lamp-text{font-size:10px;font-family:'Orbitron',monospace;font-weight:900;letter-spacing:1px}
/* Reels */
.reels-wrap{
  background:#000;border:2px solid #2a0040;border-radius:12px;
  padding:8px;display:flex;gap:6px;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.reels-wrap::after{
  content:'';position:absolute;top:50%;left:0;right:0;height:2px;
  background:rgba(255,215,0,.3);transform:translateY(-50%);pointer-events:none;
}
.reel{
  flex:1;height:100px;background:#050010;border:1px solid #1a0030;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;overflow:hidden;position:relative;
  transition:filter .1s;
}
.reel.spinning{filter:blur(2px);animation:reel-blur .08s linear infinite}
@keyframes reel-blur{0%{transform:translateY(-6px)}50%{transform:translateY(6px)}100%{transform:translateY(-6px)}}
.payline{height:1px;background:rgba(255,215,0,.2);margin:4px 0}
/* Result */
.result-area{
  min-height:44px;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:var(--gold);
  font-family:'Orbitron',monospace;letter-spacing:2px;
  text-shadow:0 0 10px rgba(255,215,0,.5);
  margin:8px 0;
}
/* Controls */
.bet-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.bet-btn{
  background:transparent;border:1px solid #440066;color:var(--text);
  width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;
  transition:all .15s;
}
.bet-btn:hover{background:rgba(153,51,255,.2);border-color:#9933ff}
.bet-label{font-family:'Orbitron',monospace;font-size:14px;color:var(--dim)}
.bet-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--gold);min-width:50px;text-align:center}
.lever{
  display:block;width:100%;padding:16px;
  background:linear-gradient(135deg,#880000,#cc0000,#880000);
  border:2px solid #ff4444;border-radius:40px;
  color:#fff;font-size:18px;font-weight:700;letter-spacing:3px;
  font-family:'Orbitron',monospace;cursor:pointer;
  box-shadow:0 4px 20px rgba(204,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2);
  transition:all .15s;margin-bottom:16px;
}
.lever:hover{background:linear-gradient(135deg,#aa0000,#ff0000,#aa0000);transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,0,0,.6)}
.lever:active{transform:translateY(2px);box-shadow:0 2px 10px rgba(204,0,0,.4)}
.lever:disabled{background:linear-gradient(135deg,#333,#444);border-color:#555;box-shadow:none;cursor:not-allowed;transform:none}
/* Exchange */
.exchange{
  background:rgba(0,0,0,.4);border:1px solid #2a0040;border-radius:12px;
  padding:14px;margin-bottom:16px;
}
.ex-title{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:10px}
.ex-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ex-row input{
  background:#0a0015;border:1px solid #440066;color:var(--text);
  padding:8px 12px;border-radius:8px;width:110px;font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
}
.ex-row input:focus{outline:none;border-color:var(--purple)}
.ex-btn{
  padding:8px 16px;border:1px solid #440066;border-radius:8px;
  cursor:pointer;font-size:13px;font-family:'Noto Sans JP',sans-serif;
  transition:all .15s;
}
.ex-btn.buy{background:rgba(153,51,255,.2);color:#cc88ff;border-color:#9933ff}
.ex-btn.buy:hover{background:rgba(153,51,255,.4)}
.ex-btn.sell{background:rgba(0,255,136,.1);color:var(--green);border-color:rgba(0,255,136,.4)}
.ex-btn.sell:hover{background:rgba(0,255,136,.2)}
.ex-info{font-size:12px;color:var(--dim);margin-left:4px}
.ex-gm{color:var(--gold);font-weight:700}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.stat{
  background:rgba(0,0,0,.5);border:1px solid #1a0030;border-radius:8px;
  padding:8px;text-align:center;
}
.stat-val{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:10px;color:var(--dim);margin-top:2px}
/* Medal display */
.medal-bar{
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);
  border-radius:10px;padding:10px 16px;margin-bottom:16px;
}
.medal-bar .lbl{font-size:11px;color:var(--dim)}
.medal-bar .val{font-family:'Orbitron',monospace;font-size:20px;color:var(--gold);font-weight:700}
/* Payout table */
.payout{
  margin-top:16px;background:rgba(0,0,0,.4);border:1px solid #1a0030;
  border-radius:10px;padding:12px;font-size:11px;color:var(--dim);
}
.payout-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1a0020}
.payout-row:last-child{border-bottom:none}
.payout-sym{font-size:14px}
.payout-mult{color:var(--gold);font-family:'Orbitron',monospace}
/* Notification */
#notif{
  position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;
  font-size:14px;z-index:999;transform:translateX(200%);transition:transform .3s;
  background:#cc0044;color:#fff;max-width:240px;
}
#notif.show{transform:translateX(0)}
#notif.ok{background:#007733}
</style>
</head>
<body>
<h1 class="title">🎰 JUGGLER</h1>
<div class="subtitle">— MEDAL SLOT MACHINE —</div>

<div class="machine">
  <div class="medal-bar">
    <span class="lbl">💰 所持メダル</span>
    <span class="val" id="medals">300</span>
  </div>

  <div class="exchange">
    <div class="ex-title">💱 メダル換金</div>
    <div class="ex-row">
      <input type="number" id="ex-input" placeholder="枚数" min="1">
      <button class="ex-btn buy" id="buy-btn">購入 →</button>
      <button class="ex-btn sell" id="sell-btn">← 精算</button>
      <span class="ex-info">ゲームメダル: <span class="ex-gm" id="gm-disp">0</span></span>
    </div>
  </div>

  <div class="lamp-wrap">
    <div class="lamp" id="lamp"><span class="lamp-text">GOGO!!</span></div>
  </div>

  <div class="reels-wrap">
    <div class="reel" id="r0">🍒</div>
    <div class="reel" id="r1">🍋</div>
    <div class="reel" id="r2">🍒</div>
  </div>
  <div class="payline"></div>

  <div class="result-area" id="result">レバーを引いてスタート！</div>

  <div class="bet-row">
    <button class="bet-btn" id="bet-minus">－</button>
    <span class="bet-label">BET</span>
    <span class="bet-val" id="bet-val">3</span>
    <span class="bet-label">枚</span>
    <button class="bet-btn" id="bet-plus">＋</button>
  </div>

  <button class="lever" id="lever">🕹️ L E V E R</button>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-games">0</div><div class="stat-lbl">GAME</div></div>
    <div class="stat"><div class="stat-val" id="s-big">0</div><div class="stat-lbl">BIG</div></div>
    <div class="stat"><div class="stat-val" id="s-reg">0</div><div class="stat-lbl">REG</div></div>
    <div class="stat"><div class="stat-val" id="s-gm">0</div><div class="stat-lbl">GAME🪙</div></div>
  </div>

  <div class="payout">
    <div style="color:#aa88cc;font-size:10px;letter-spacing:2px;margin-bottom:6px">— PAYOUT TABLE —</div>
    <div class="payout-row"><span class="payout-sym">7️⃣7️⃣7️⃣</span><span>BIG BONUS</span><span class="payout-mult">×30</span></div>
    <div class="payout-row"><span class="payout-sym">🎰🎰🎰</span><span>REG BONUS</span><span class="payout-mult">×15</span></div>
    <div class="payout-row"><span class="payout-sym">⭐⭐⭐</span><span>スター</span><span class="payout-mult">×8</span></div>
    <div class="payout-row"><span class="payout-sym">🔔🔔🔔</span><span>ベル</span><span class="payout-mult">×6</span></div>
    <div class="payout-row"><span class="payout-sym">🍇🍇🍇</span><span>ブドウ</span><span class="payout-mult">×4</span></div>
    <div class="payout-row"><span class="payout-sym">🍒🍒_</span><span>チェリー</span><span class="payout-mult">×1</span></div>
  </div>
</div>

<div id="notif"></div>

<script>
const SYMS = ['🍒','🍋','🔔','🍇','⭐','🎰','7️⃣'];
const WEIGHTS = [38,24,14,10,7,4,3];
const PAYS = {
  '7️⃣7️⃣7️⃣':{m:30,type:'BIG',msg:'🔥 BIG BONUS!! 🔥'},
  '🎰🎰🎰':{m:15,type:'REG',msg:'✨ REG BONUS ✨'},
  '⭐⭐⭐':{m:8,msg:'⭐ スター！'},
  '🔔🔔🔔':{m:6,msg:'🔔 ベル！'},
  '🍇🍇🍇':{m:4,msg:'🍇 ブドウ！'},
  '🍋🍋🍋':{m:3,msg:'🍋 レモン！'},
  '🍒🍒🍒':{m:2,msg:'🍒 チェリー3枚！'},
};

let medals = +localStorage.getItem('jug_medals')||300;
let gm = 0, bet = 3, spinning = false;
let sGames=0,sBig=0,sReg=0;

// Audio
const AC = window.AudioContext||window.webkitAudioContext;
let ac;
function ga(){if(!ac)try{ac=new AC()}catch(e){}return ac}
function tone(f,d,t='sine',v=.3){
  const a=ga();if(!a)return;
  const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);
}
function sndCoin(){tone(880,.07,'square',.2);setTimeout(()=>tone(1100,.09,'square',.2),70)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.18,'sine',.3),i*110))}
function sndLose(){tone(220,.3,'sawtooth',.2)}
function sndBig(){const s=[784,880,1047,1318,1047,880,784,659,784];s.forEach((f,i)=>setTimeout(()=>tone(f,.15,'sine',.35),i*140))}
function sndReel(){tone(180+Math.random()*60,.04,'square',.1)}
function sndClick(){tone(440,.05,'square',.08)}

function save(){localStorage.setItem('jug_medals',medals)}
function updateUI(){
  document.getElementById('medals').textContent=medals;
  document.getElementById('gm-disp').textContent=gm;
  document.getElementById('s-games').textContent=sGames;
  document.getElementById('s-big').textContent=sBig;
  document.getElementById('s-reg').textContent=sReg;
  document.getElementById('s-gm').textContent=gm;
  document.getElementById('bet-val').textContent=bet;
}
function notify(msg,ok=false){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className=ok?'show ok':'show';
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2200);
}
function pickSym(){
  let r=Math.random()*100,c=0;
  for(let i=0;i<SYMS.length;i++){c+=WEIGHTS[i];if(r<c)return SYMS[i]}
  return SYMS[0];
}

document.getElementById('buy-btn').addEventListener('click',()=>{
  const v=+document.getElementById('ex-input').value||0;
  if(v<=0)return notify('枚数を入力してください');
  if(medals<v)return notify('メダルが足りません');
  medals-=v;gm+=v;save();updateUI();sndCoin();notify(`${v}枚購入しました`,true);
});
document.getElementById('sell-btn').addEventListener('click',()=>{
  if(gm<=0)return notify('ゲームメダルがありません');
  medals+=gm;const n=gm;gm=0;save();updateUI();sndWin();notify(`${n}枚精算しました！`,true);
});
document.getElementById('bet-minus').addEventListener('click',()=>{bet=Math.max(1,bet-1);sndClick();updateUI()});
document.getElementById('bet-plus').addEventListener('click',()=>{bet=Math.min(10,bet+1);sndClick();updateUI()});

document.getElementById('lever').addEventListener('click',()=>{
  if(spinning)return;
  if(gm<bet){notify('ゲームメダルが足りません');return}
  ga();
  gm-=bet;sGames++;spinning=true;
  document.getElementById('lever').disabled=true;
  document.getElementById('lamp').classList.remove('on');
  document.getElementById('result').textContent='';
  const ids=['r0','r1','r2'];
  ids.forEach(id=>document.getElementById(id).classList.add('spinning'));
  const ivs=ids.map(id=>setInterval(()=>{
    document.getElementById(id).textContent=SYMS[Math.floor(Math.random()*SYMS.length)];
    sndReel();
  },80));
  const final=[pickSym(),pickSym(),pickSym()];
  ids.forEach((id,i)=>setTimeout(()=>{
    clearInterval(ivs[i]);
    document.getElementById(id).classList.remove('spinning');
    document.getElementById(id).textContent=final[i];
    if(i===2)evalResult(final);
  },(i+1)*550+Math.random()*150));
  updateUI();
});

function evalResult(s){
  spinning=false;
  document.getElementById('lever').disabled=false;
  const key=s.join('');
  let res=PAYS[key];
  if(!res&&s[0]==='🍒'&&s[1]==='🍒')res={m:1,msg:'🍒 チェリー2枚'};
  if(!res&&s[0]==='🍒')res={m:1,msg:'🍒 チェリー1枚'};
  if(res){
    const w=res.m*bet;gm+=w;
    document.getElementById('result').textContent=`${res.msg}  +${w}`;
    if(res.type==='BIG'){sBig++;sndBig();document.getElementById('lamp').classList.add('on')}
    else if(res.type==='REG'){sReg++;sndWin();document.getElementById('lamp').classList.add('on')}
    else sndWin();
    if(!res.type&&Math.random()<.04){document.getElementById('lamp').classList.add('on');setTimeout(()=>document.getElementById('lamp').classList.remove('on'),3000)}
  } else {
    document.getElementById('result').textContent='はずれ…';sndLose();
  }
  updateUI();
}
updateUI();
</script>
</body>
</html>
