<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟦 テトリス</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+JP:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--panel:#141414;--cyan:#00f5ff;--yellow:#ffe000;
  --text:#e8e8e8;--dim:#666;--border:#2a2a2a;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:20px 12px;
  background-image:
    linear-gradient(rgba(0,245,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,245,255,.02) 1px,transparent 1px);
  background-size:40px 40px;
}
h1.title{
  font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,28px);
  color:var(--cyan);letter-spacing:2px;margin-bottom:4px;text-align:center;
  text-shadow:0 0 15px rgba(0,245,255,.5);
}
.subtitle{font-size:11px;color:var(--dim);letter-spacing:3px;margin-bottom:20px;text-align:center;font-family:'Press Start 2P',monospace}

.medal-bar{
  width:min(520px,100%);display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.15);
  border-radius:8px;padding:10px 16px;margin-bottom:14px;
}
.medal-bar .lbl{font-size:11px;color:var(--dim);font-family:'Press Start 2P',monospace}
.medal-bar .val{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--yellow)}

.game-wrap{
  display:flex;gap:16px;align-items:flex-start;
  width:min(520px,100%);
}
.board-wrap{position:relative}
#canvas{
  display:block;border:1px solid #333;
  image-rendering:pixelated;
  box-shadow:0 0 20px rgba(0,245,255,.1);
}
.overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.88);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  border-radius:2px;
}
.overlay h2{
  font-family:'Press Start 2P',monospace;font-size:14px;
  color:var(--cyan);text-align:center;line-height:1.8;
}
.overlay p{font-size:12px;color:var(--dim);text-align:center;line-height:1.8}
.side{width:140px;flex-shrink:0}
.panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:12px;margin-bottom:10px;text-align:center;
}
.panel-lbl{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--dim);margin-bottom:6px}
.panel-val{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--yellow)}
#next-canvas{display:block;margin:0 auto;background:#0a0a0a;border:1px solid var(--border)}
.btn{
  display:block;width:100%;padding:10px;border-radius:6px;cursor:pointer;
  font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:1px;
  transition:all .15s;border:1px solid;margin-bottom:8px;
}
.btn-start{background:rgba(0,245,255,.1);border-color:var(--cyan);color:var(--cyan)}
.btn-start:hover{background:rgba(0,245,255,.25)}
.btn-stop{background:rgba(255,50,50,.1);border-color:#ff3232;color:#ff8888}
.btn-stop:hover{background:rgba(255,50,50,.2)}
.keys{font-size:10px;color:var(--dim);line-height:2;text-align:left}
.keys span{color:#888}

/* Mobile controls */
.mobile-ctrl{
  display:none;
  grid-template-columns:repeat(3,52px);
  grid-template-rows:repeat(2,52px);
  gap:6px;margin-top:14px;justify-content:center;
}
@media(max-width:600px){
  .mobile-ctrl{display:grid}
  .keys{display:none}
}
.mctrl-btn{
  background:rgba(255,255,255,.06);border:1px solid #333;border-radius:8px;
  color:var(--text);font-size:22px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.mctrl-btn:active{background:rgba(0,245,255,.2)}
.mctrl-span2{grid-column:span 3}

#notif{
  position:fixed;top:16px;right:16px;padding:10px 18px;border-radius:8px;
  font-size:13px;z-index:999;transform:translateX(200%);transition:transform .3s;
  background:#007733;color:#fff;
}
#notif.show{transform:translateX(0)}
#notif.bad{background:#cc0033}
</style>
</head>
<body>
<h1 class="title">TETRIS</h1>
<div class="subtitle">— MEDAL EDITION —</div>

<div class="medal-bar">
  <span class="lbl">💰 MEDALS</span>
  <span class="val" id="medals">300</span>
</div>

<div class="game-wrap">
  <div class="board-wrap">
    <canvas id="canvas" width="200" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2>TETRIS</h2>
      <p>スタートに10メダル<br>100点 → 1メダル獲得</p>
      <button class="btn btn-start" id="start-btn">START (10🪙)</button>
    </div>
  </div>

  <div class="side">
    <div class="panel">
      <div class="panel-lbl">SCORE</div>
      <div class="panel-val" id="score">0</div>
    </div>
    <div class="panel">
      <div class="panel-lbl">LEVEL</div>
      <div class="panel-val" id="level">1</div>
    </div>
    <div class="panel">
      <div class="panel-lbl">LINES</div>
      <div class="panel-val" id="lines">0</div>
    </div>
    <div class="panel">
      <div class="panel-lbl">NEXT</div>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
    <button class="btn btn-stop" id="stop-btn" style="display:none">QUIT</button>
    <div class="keys">
      <span>← →</span> 移動<br>
      <span>↑</span> 回転<br>
      <span>↓</span> 速下げ<br>
      <span>Space</span> 即落下
    </div>
  </div>
</div>

<div class="mobile-ctrl" id="mobile-ctrl">
  <div></div>
  <div class="mctrl-btn" id="mc-up">↑</div>
  <div></div>
  <div class="mctrl-btn" id="mc-left">←</div>
  <div class="mctrl-btn" id="mc-down">↓</div>
  <div class="mctrl-btn" id="mc-right">→</div>
  <div class="mctrl-btn mctrl-span2" id="mc-space" style="grid-column:span 3;height:44px">⬇ DROP</div>
</div>

<div id="notif"></div>

<script>
const COLS=10,ROWS=20,CS=20;
const PIECES=[
  {s:[[1,1,1,1]],c:'#00f5ff'},
  {s:[[1,1],[1,1]],c:'#ffe000'},
  {s:[[1,1,1],[0,1,0]],c:'#cc44ff'},
  {s:[[1,1,1],[1,0,0]],c:'#ff8800'},
  {s:[[1,1,1],[0,0,1]],c:'#4488ff'},
  {s:[[0,1,1],[1,1,0]],c:'#00ff66'},
  {s:[[1,1,0],[0,1,1]],c:'#ff3344'},
];

let cv=document.getElementById('canvas');
let nx=document.getElementById('next-canvas');
let ctx=cv.getContext('2d');
let nctx=nx.getContext('2d');
let board,piece,next,score,level,lines,running,timer;
let medals=+localStorage.getItem('tet_medals')||300;

function save(){localStorage.setItem('tet_medals',medals)}
function updMedals(){document.getElementById('medals').textContent=medals}

// Audio
const AC=window.AudioContext||window.webkitAudioContext;
let ac;
function ga(){if(!ac)try{ac=new AC()}catch(e){}return ac}
function tone(f,d,t='sine',v=.25){
  const a=ga();if(!a)return;
  const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);
  o.start();o.stop(a.currentTime+d);
}
function sndPlace(){tone(200,.08,'square',.15)}
function sndLine(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sine',.25),i*90))}
function sndOver(){[400,350,300,250,200].forEach((f,i)=>setTimeout(()=>tone(f,.15,'sawtooth',.2),i*120))}
function sndMove(){tone(440,.04,'square',.07)}

function notify(msg,ok=true){
  const el=document.getElementById('notif');
  el.textContent=msg;el.className=ok?'show':'show bad';
  clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2200);
}

function rndPiece(){const p=PIECES[Math.floor(Math.random()*PIECES.length)];return{s:p.s.map(r=>[...r]),c:p.c,x:Math.floor(COLS/2)-Math.floor(p.s[0].length/2),y:0}}
function rotate(s){return s[0].map((_,i)=>s.map(r=>r[i]).reverse())}
function canPlace(s,x,y){return s.every((row,r)=>row.every((c,col)=>!c||(y+r>=0&&y+r<ROWS&&x+col>=0&&x+col<COLS&&!board[y+r][x+col])))}

function startGame(){
  if(medals<10){notify('10メダル必要です',false);return}
  ga();
  medals-=10;save();updMedals();
  board=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  score=0;level=1;lines=0;running=true;
  next=rndPiece();spawn();
  document.getElementById('overlay').style.display='none';
  document.getElementById('stop-btn').style.display='block';
  document.getElementById('mobile-ctrl').style.display='grid';
  clearInterval(timer);
  timer=setInterval(step,600);
  updStats();
  notify('スタート！',true);
}
function stopGame(msg=''){
  running=false;clearInterval(timer);
  const earned=Math.floor(score/100);
  if(earned>0){medals+=earned;save();updMedals()}
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`<h2>${msg||'GAME\nOVER'}</h2><p>スコア: ${score}<br>獲得メダル: +${earned}</p><button class="btn btn-start" id="start-btn">RETRY (10🪙)</button>`;
  document.getElementById('start-btn').addEventListener('click',startGame);
  document.getElementById('stop-btn').style.display='none';
  document.getElementById('mobile-ctrl').style.display='none';
  sndOver();
}
function spawn(){
  piece=next;piece.x=Math.floor(COLS/2)-Math.floor(piece.s[0].length/2);piece.y=0;
  next=rndPiece();drawNext();
  if(!canPlace(piece.s,piece.x,piece.y)){stopGame();return}
}
function step(){
  if(!running)return;
  if(canPlace(piece.s,piece.x,piece.y+1)){piece.y++}
  else{lock();clearLines();spawn()}
  draw();
}
function lock(){
  piece.s.forEach((row,r)=>row.forEach((c,col)=>{if(c)board[piece.y+r][piece.x+col]=piece.c}));
  sndPlace();
}
function clearLines(){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c)){board.splice(r,1);board.unshift(Array(COLS).fill(0));cleared++;r++}
  }
  if(cleared){
    const pts=[0,100,300,500,800][cleared]||800;
    score+=pts*level;lines+=cleared;level=Math.floor(lines/10)+1;
    clearInterval(timer);timer=setInterval(step,Math.max(80,600-level*50));
    sndLine();updStats();
  }
}
function updStats(){
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  document.getElementById('lines').textContent=lines;
}
function draw(){
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,COLS*CS,ROWS*CS);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]){
      ctx.fillStyle=board[r][c];ctx.fillRect(c*CS,r*CS,CS-1,CS-1);
      ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(c*CS,r*CS,CS-1,3);
    }
    ctx.strokeStyle='#161616';ctx.strokeRect(c*CS,r*CS,CS,CS);
  }
  if(piece&&running){
    // Ghost
    let gy=piece.y;
    while(canPlace(piece.s,piece.x,gy+1))gy++;
    piece.s.forEach((row,r)=>row.forEach((c,col)=>{
      if(c){ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect((piece.x+col)*CS,(gy+r)*CS,CS-1,CS-1)}
    }));
    ctx.fillStyle=piece.c;
    piece.s.forEach((row,r)=>row.forEach((c,col)=>{
      if(c){
        ctx.fillRect((piece.x+col)*CS,(piece.y+r)*CS,CS-1,CS-1);
        ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect((piece.x+col)*CS,(piece.y+r)*CS,CS-1,3);
        ctx.fillStyle=piece.c;
      }
    }));
  }
}
function drawNext(){
  nctx.fillStyle='#0a0a0a';nctx.fillRect(0,0,80,80);
  if(!next)return;
  const ox=Math.floor((4-next.s[0].length)/2)*18+4;
  const oy=Math.floor((4-next.s.length)/2)*18+4;
  nctx.fillStyle=next.c;
  next.s.forEach((row,r)=>row.forEach((c,col)=>{if(c){nctx.fillRect(ox+col*18,oy+r*18,17,17)}}));
}

document.addEventListener('keydown',e=>{
  if(!running)return;
  if(e.key==='ArrowLeft'){if(canPlace(piece.s,piece.x-1,piece.y)){piece.x--;sndMove()}e.preventDefault()}
  else if(e.key==='ArrowRight'){if(canPlace(piece.s,piece.x+1,piece.y)){piece.x++;sndMove()}e.preventDefault()}
  else if(e.key==='ArrowDown'){if(canPlace(piece.s,piece.x,piece.y+1))piece.y++;e.preventDefault()}
  else if(e.key==='ArrowUp'){const rot=rotate(piece.s);if(canPlace(rot,piece.x,piece.y)){piece.s=rot;sndMove()}e.preventDefault()}
  else if(e.key===' '){while(canPlace(piece.s,piece.x,piece.y+1))piece.y++;lock();clearLines();spawn();e.preventDefault()}
  draw();
});

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('stop-btn').addEventListener('click',()=>stopGame('QUIT'));

// Mobile controls
document.getElementById('mc-left').addEventListener('click',()=>{if(!running)return;if(canPlace(piece.s,piece.x-1,piece.y)){piece.x--;sndMove();draw()}});
document.getElementById('mc-right').addEventListener('click',()=>{if(!running)return;if(canPlace(piece.s,piece.x+1,piece.y)){piece.x++;sndMove();draw()}});
document.getElementById('mc-up').addEventListener('click',()=>{if(!running)return;const rot=rotate(piece.s);if(canPlace(rot,piece.x,piece.y)){piece.s=rot;sndMove();draw()}});
document.getElementById('mc-down').addEventListener('click',()=>{if(!running)return;if(canPlace(piece.s,piece.x,piece.y+1)){piece.y++;draw()}});
document.getElementById('mc-space').addEventListener('click',()=>{if(!running)return;while(canPlace(piece.s,piece.x,piece.y+1))piece.y++;lock();clearLines();spawn();draw()});

updMedals();draw();
</script>
</body>
</html>
